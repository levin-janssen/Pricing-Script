<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Amazon Feed Submission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Spinner animation */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #4F46E5;
            /* Indigo */
            border-radius: 50%;
            width: 2rem;
            height: 2rem;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-6">🔌 Amazon Feed Submission</h1>

        <button id="submitBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">
            Submit Feed
        </button>

        <div id="statusContainer" class="mt-6 flex items-center justify-center">
            <div id="spinner" class="spinner hidden"></div>
            <span id="status" class="text-gray-700">Status: Not started</span>
        </div>
    </div>

    <script charset="UTF-8">
        let feedId = null;
        let interval = null;

        const statusEl = document.getElementById("status");
        const spinnerEl = document.getElementById("spinner");

        document.getElementById("submitBtn").addEventListener("click", async () => {
            statusEl.textContent = "Submitting feed...";
            spinnerEl.classList.remove("hidden");

            const res = await fetch("submit.php");
            const data = await res.json();

            if (data.feedId) {
                feedId = data.feedId;
                statusEl.textContent = "Feed ID: " + feedId;

                // Start polling every 20 seconds
                interval = setInterval(async () => {
                    const resStatus = await fetch("check.php?feedId=" + feedId);
                    const statusData = await resStatus.json();
                    const processingStatus = statusData.processingStatus || "Unknown";
                    let displayText = "Feed Status: " + processingStatus;

                    if (processingStatus === "FATAL" && statusData.processingReport) {
                        displayText += "\n\nProcessing Report:\n" + statusData.processingReport;
                        clearInterval(interval);
                        spinnerEl.classList.add("hidden");
                    } else if (processingStatus === "FATAL"){
                        displayText = "❌ FATAL error without report.";
                        clearInterval(interval);
                        spinnerEl.classList.add("hidden");
                    } else if (processingStatus === "DONE") {
                        displayText = "✅ Feed processed successfully!";
                        clearInterval(interval);
                        spinnerEl.classList.add("hidden");
                    } else if (processingStatus === "CANCELLED") {
                        displayText = "❌ Feed processing cancelled.";
                        clearInterval(interval);
                        spinnerEl.classList.add("hidden");
                    }

                    statusEl.textContent = displayText;

                }, 10000);

            } else if (data.error) {
                spinnerEl.classList.add("hidden");
                statusEl.textContent = "Error: " + data.error;
                console.error(data);
            }
        });
    </script>
</body>

</html>
